<section id="contact" class="contact-section">
  <h2>Let's Connect</h2>

  <p>
    Interested in discussing opportunities, technology, or collaboration?
    Feel free to reach out.
  </p>

  <form #contactForm="ngForm"
        class="contact-form"
        (ngSubmit)="sendMessage()">

    <!-- Name -->

    <div class="form-group">
      <label>Name *</label>

      <input type="text"
             name="name"
             [(ngModel)]="model.name"
             #name="ngModel"
             required
             placeholder="Your name"
             [class.invalid]="name.invalid && (name.touched || contactForm.submitted)" />

      <div class="error"
           *ngIf="name.invalid && (name.touched || contactForm.submitted)">
        Name is required.
      </div>
    </div>

    <!-- Email -->

    <div class="form-group">
      <label>Email *</label>

      <input type="email"
             name="email"
             [(ngModel)]="model.email"
             #email="ngModel"
             required
             email
             placeholder="your@email.com"
             [class.invalid]="email.invalid && (email.touched || contactForm.submitted)" />

      <div class="error"
           *ngIf="email.invalid && (email.touched || contactForm.submitted)">

        <span *ngIf="email.errors?.['required']">
          Email is required.
        </span>

        <span *ngIf="email.errors?.['email']">
          Please enter a valid email address.
        </span>

      </div>
    </div>

    <!-- Phone -->

    <div class="form-group">
      <label>Phone</label>

      <input type="text"
             name="phone"
             [(ngModel)]="model.phone"
             placeholder="+91 XXXXX XXXXX" />
    </div>

    <!-- Role -->

    <div class="form-group">
      <label>Role / Company</label>

      <input type="text"
             name="role"
             [(ngModel)]="model.role"
             placeholder="Recruiter, Engineering Manager..." />
    </div>

    <!-- Subject -->

    <div class="form-group">
      <label>Subject *</label>

      <input type="text"
             name="subject"
             [(ngModel)]="model.subject"
             #subject="ngModel"
             required
             placeholder="Opportunity, Collaboration..."
             [class.invalid]="subject.invalid && (subject.touched || contactForm.submitted)" />

      <div class="error"
           *ngIf="subject.invalid && (subject.touched || contactForm.submitted)">
        Subject is required.
      </div>
    </div>

    <!-- Message -->

    <div class="form-group">
      <label>Message *</label>

      <textarea rows="6"
                name="message"
                [(ngModel)]="model.message"
                #message="ngModel"
                required
                placeholder="Tell me how I can help..."
                [class.invalid]="message.invalid && (message.touched || contactForm.submitted)">
      </textarea>

      <div class="error"
           *ngIf="message.invalid && (message.touched || contactForm.submitted)">
        Message is required.
      </div>
    </div>

    <button type="submit"
            [disabled]="contactForm.invalid || sending">

      <span *ngIf="!sending">
        Send Message
      </span>

      <span *ngIf="sending">
        ⏳ Sending...
      </span>

    </button>

    <p *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </p>

    <p *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </p>

  </form>
</section>
